<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VS Code Editor | Live Preview | Fixed Select All & Backspace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1e1e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .editor-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1e1e1e;
      color: #d4d4d4;
    }

    .editor-header {
      background: #252526;
      padding: 8px 16px;
      border-bottom: 1px solid #3c3c3c;
      font-size: 13px;
      display: flex;
      gap: 20px;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .header-right {
      display: flex;
      gap: 12px;
    }

    .preview-btn {
      background: #0e639c;
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: background 0.2s;
    }

    .preview-btn:hover {
      background: #1177bb;
    }

    .preview-btn.active {
      background: #6c6c6c;
    }

    .editor-main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .editor-main.split {
      flex-direction: row;
    }

    .editor-wrapper {
      display: flex;
      flex: 1;
      overflow: auto;
      position: relative;
      background: #1e1e1e;
      min-width: 300px;
    }

    .preview-pane {
      width: 50%;
      background: white;
      border-left: 1px solid #3c3c3c;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-header {
      background: #252526;
      padding: 6px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #3c3c3c;
    }

    .preview-header span {
      font-size: 12px;
      color: #cccccc;
    }

    .close-preview {
      background: none;
      border: none;
      color: #cccccc;
      cursor: pointer;
      font-size: 18px;
      padding: 0 8px;
      border-radius: 4px;
    }

    .close-preview:hover {
      background: #3c3c3c;
    }

    .preview-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
    }

    .gutter {
      background: #1e1e1e;
      color: #858585;
      text-align: right;
      padding-right: 12px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.5;
      user-select: none;
      border-right: 1px solid #3c3c3c;
      min-width: 60px;
      position: relative;
      z-index: 2;
    }

    .gutter-line {
      padding: 0 8px 0 12px;
      white-space: nowrap;
      cursor: pointer;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
    }

    .fold-icon {
      cursor: pointer;
      font-size: 12px;
      width: 16px;
      text-align: center;
      color: #858585;
      display: inline-block;
    }

    .fold-icon:hover {
      color: #cccccc;
    }

    .code-area {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #1e1e1e;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
      white-space: pre;
    }

    .code-content {
      position: relative;
      min-height: 100%;
    }

    .line {
      white-space: pre;
      position: relative;
      display: block;
      padding-left: 0;
      cursor: text;
    }

    .line.active-line {
      background: #2a2d2e;
    }

    /* Syntax highlighting colors */
    .keyword { color: #569cd6; }
    .string { color: #ce9178; }
    .comment { color: #6a9955; }
    .number { color: #b5cea8; }
    .bracket { color: #ffd700; }

    .cursor {
      display: inline-block;
      width: 2px;
      background-color: #ffffff;
      position: absolute;
      animation: blink 1s step-end infinite;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .selection {
      background: #264f78;
      position: absolute;
      pointer-events: none;
      opacity: 0.5;
    }

    .autocomplete-dropdown {
      position: absolute;
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      font-family: monospace;
      font-size: 14px;
      min-width: 200px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .autocomplete-item {
      padding: 6px 12px;
      cursor: pointer;
      color: #cccccc;
    }

    .autocomplete-item.selected {
      background: #094771;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    ::-webkit-scrollbar-thumb {
      background: #424242;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #4e4e4e;
    }
  </style>
</head>
<body>
<div class="editor-container">
  <div class="editor-header">
    <div class="header-left">
      <span>📄 editor.js</span>
      <span>⚡ Multi-Cursor | Syntax Highlight | Folding | Autocomplete</span>
    </div>
    <div class="header-right">
      <button class="preview-btn" id="previewBtn">🌐 Live Preview</button>
    </div>
  </div>
  <div class="editor-main" id="editorMain">
    <div class="editor-wrapper" id="editorWrapper">
      <div class="gutter" id="gutter"></div>
      <div class="code-area" id="codeArea" contenteditable="true" spellcheck="false"></div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- Editor State -----
    let lines = [];
    let cursors = [{ line: 0, ch: 0 }];
    let foldStates = new Map();
    let activeLine = 0;
    let currentSelection = { start: null, end: null, active: false };
    
    // DOM elements
    const codeArea = document.getElementById('codeArea');
    const gutter = document.getElementById('gutter');
    const previewBtn = document.getElementById('previewBtn');
    const editorMain = document.getElementById('editorMain');
    
    // Preview state
    let previewActive = false;
    let previewPane = null;
    let previewFrame = null;
    
    // Autocomplete state
    let acVisible = false;
    let acItems = [];
    let acSelectedIdx = 0;
    let acDropdown = null;
    
    // EXAMPLE CODE to test the editor
    const EXAMPLE_CODE = `// Welcome to the VS Code Style Editor!
// Try these features:
// - Select All: Ctrl+A (NOW WORKING!)
// - Backspace/Delete: Fully functional
// - Multi-cursor: Alt + Click
// - Code Folding: Click on ▼/▶ in gutter
// - Autocomplete: Type 'con' or 'func'
// - Live Preview: Click top-right button

function fibonacci(n) {
    if (n <= 1) return n;
    return fibonacci(n - 1) + fibonacci(n - 2);
}

// Example: Loop through numbers
for (let i = 0; i < 10; i++) {
    console.log("Fibonacci of " + i + ":", fibonacci(i));
}

// Arrow function example
const greet = (name) => {
    return \`Hello, \${name}!\`;
};

console.log(greet("Developer"));

// Try typing: console. (autocomplete will show)
// Try Alt+Click on multiple lines to edit simultaneously
// Try Ctrl+A to select all, then Backspace to delete everything!`;

    lines = EXAMPLE_CODE.split('\n');
    
    // ----- Syntax Tokenizer -----
    const KEYWORDS = new Set(['function', 'return', 'const', 'let', 'var', 'if', 'else', 'for', 'while', 'break', 'continue', 'switch', 'case', 'default', 'try', 'catch', 'finally', 'new', 'this', 'typeof', 'instanceof', 'class', 'extends', 'super', 'import', 'export', 'from', 'as', 'static', 'get', 'set']);
    
    function tokenizeLine(line) {
        if (!line) return [{ type: 'text', value: '' }];
        const tokens = [];
        let i = 0;
        const len = line.length;
        
        while (i < len) {
            // Strings
            if (line[i] === '"' || line[i] === "'" || line[i] === '`') {
                const quote = line[i];
                let start = i;
                i++;
                while (i < len && line[i] !== quote) {
                    if (line[i] === '\\') i++;
                    i++;
                }
                i++;
                tokens.push({ type: 'string', value: line.substring(start, i) });
                continue;
            }
            
            // Single line comments
            if (line[i] === '/' && line[i+1] === '/') {
                tokens.push({ type: 'comment', value: line.substring(i) });
                break;
            }
            
            // Multi-line comments
            if (line[i] === '/' && line[i+1] === '*') {
                let start = i;
                i += 2;
                while (i < len && !(line[i-1] === '*' && line[i] === '/')) i++;
                i++;
                tokens.push({ type: 'comment', value: line.substring(start, i) });
                continue;
            }
            
            // Numbers
            if (/[0-9]/.test(line[i])) {
                let start = i;
                while (i < len && /[0-9.]/.test(line[i])) i++;
                tokens.push({ type: 'number', value: line.substring(start, i) });
                continue;
            }
            
            // Keywords/Identifiers
            if (/[a-zA-Z_]/.test(line[i])) {
                let start = i;
                while (i < len && /[a-zA-Z0-9_]/.test(line[i])) i++;
                const word = line.substring(start, i);
                if (KEYWORDS.has(word)) {
                    tokens.push({ type: 'keyword', value: word });
                } else {
                    tokens.push({ type: 'text', value: word });
                }
                continue;
            }
            
            // Brackets
            if ('{}[]()'.includes(line[i])) {
                tokens.push({ type: 'bracket', value: line[i] });
                i++;
                continue;
            }
            
            tokens.push({ type: 'text', value: line[i] });
            i++;
        }
        return tokens;
    }
    
    function renderLineHTML(line, lineIdx) {
        const tokens = tokenizeLine(line);
        let html = '';
        for (const token of tokens) {
            if (token.type === 'keyword') {
                html += `<span class="keyword">${escapeHtml(token.value)}</span>`;
            } else if (token.type === 'string') {
                html += `<span class="string">${escapeHtml(token.value)}</span>`;
            } else if (token.type === 'comment') {
                html += `<span class="comment">${escapeHtml(token.value)}</span>`;
            } else if (token.type === 'number') {
                html += `<span class="number">${escapeHtml(token.value)}</span>`;
            } else if (token.type === 'bracket') {
                html += `<span class="bracket">${escapeHtml(token.value)}</span>`;
            } else {
                html += escapeHtml(token.value);
            }
        }
        const activeClass = activeLine === lineIdx ? 'active-line' : '';
        return `<div class="line ${activeClass}" data-line="${lineIdx}" data-text="${escapeHtml(line)}">${html || ' '}</div>`;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ----- Render with virtual scrolling -----
    function renderEditor() {
        const scrollTop = codeArea.scrollTop;
        const lineHeight = 21;
        const visibleLines = Math.ceil(codeArea.clientHeight / lineHeight) + 2;
        const startLine = Math.floor(scrollTop / lineHeight);
        const endLine = Math.min(lines.length, startLine + visibleLines);
        
        let html = '<div class="code-content">';
        for (let i = startLine; i < endLine; i++) {
            if (foldStates.get(i) === true) {
                let end = findFoldEnd(i);
                html += renderLineHTML(lines[i], i);
                html += '<div style="color:#6a9955;padding-left:20px;display:block;">// ... collapsed</div>';
                i = end;
                continue;
            }
            html += renderLineHTML(lines[i], i);
        }
        html += '</div>';
        codeArea.innerHTML = html;
        
        // Render gutter
        let gutterHtml = '';
        for (let i = 0; i < lines.length; i++) {
            const isFolded = foldStates.get(i) === true;
            const hasFold = isFoldable(i);
            const foldIcon = hasFold ? (isFolded ? '▶' : '▼') : '';
            gutterHtml += `<div class="gutter-line" data-line="${i}">
                            <span class="fold-icon" data-line="${i}">${foldIcon}</span>
                            <span>${i+1}</span>
                           </div>`;
        }
        gutter.innerHTML = gutterHtml;
        
        // Attach fold click handlers
        document.querySelectorAll('.fold-icon').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const lineIdx = parseInt(el.dataset.line);
                toggleFold(lineIdx);
                renderEditor();
            });
        });
        
        // Restore cursor position
        restoreCursorAndSelection();
    }
    
    function isFoldable(lineIdx) {
        if (lineIdx >= lines.length) return false;
        const line = lines[lineIdx];
        return line.includes('{') || line.includes('function') || line.includes('=>');
    }
    
    function findFoldEnd(startLine) {
        let braceCount = 0;
        for (let i = startLine; i < lines.length; i++) {
            const line = lines[i];
            for (let ch of line) {
                if (ch === '{') braceCount++;
                if (ch === '}') braceCount--;
            }
            if (braceCount === 0 && i > startLine) {
                return i;
            }
        }
        return lines.length - 1;
    }
    
    function toggleFold(lineIdx) {
        if (foldStates.get(lineIdx)) {
            foldStates.delete(lineIdx);
        } else {
            foldStates.set(lineIdx, true);
        }
        renderEditor();
    }
    
    // Store cursor position from contenteditable
    function saveCursorPosition() {
        const selection = window.getSelection();
        if (selection.rangeCount > 0) {
            const range = selection.getRangeAt(0);
            const lineDiv = range.startContainer.nodeType === 3 ? range.startContainer.parentElement : range.startContainer;
            const lineElement = lineDiv.closest('.line');
            if (lineElement) {
                const lineIdx = parseInt(lineElement.dataset.line);
                const textBefore = getTextBeforeCursor(range, lineElement);
                cursors = [{ line: lineIdx, ch: textBefore.length }];
                activeLine = lineIdx;
            }
        }
    }
    
    function getTextBeforeCursor(range, lineElement) {
        const lineText = lineElement.dataset.text || '';
        let textNodes = [];
        const walker = document.createTreeWalker(lineElement, NodeFilter.SHOW_TEXT);
        while(walker.nextNode()) textNodes.push(walker.currentNode);
        
        let charCount = 0;
        for (let node of textNodes) {
            if (node === range.startContainer) {
                charCount += range.startOffset;
                break;
            }
            charCount += node.textContent.length;
        }
        return lineText.substring(0, charCount);
    }
    
    function restoreCursorAndSelection() {
        if (cursors.length > 0) {
            const cursor = cursors[0];
            const lineDiv = document.querySelector(`.line[data-line="${cursor.line}"]`);
            if (lineDiv) {
                setCursorPosition(lineDiv, cursor.ch);
            }
        }
    }
    
    function setCursorPosition(lineElement, offset) {
        const textNode = findTextNodeAtOffset(lineElement, offset);
        if (textNode) {
            const range = document.createRange();
            range.setStart(textNode.node, textNode.offset);
            range.collapse(true);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
    }
    
    function findTextNodeAtOffset(lineElement, offset) {
        const textNodes = [];
        const walker = document.createTreeWalker(lineElement, NodeFilter.SHOW_TEXT);
        while(walker.nextNode()) textNodes.push(walker.currentNode);
        
        let currentOffset = 0;
        for (let node of textNodes) {
            const nodeLength = node.textContent.length;
            if (currentOffset + nodeLength >= offset) {
                return { node: node, offset: offset - currentOffset };
            }
            currentOffset += nodeLength;
        }
        if (textNodes.length > 0) {
            const lastNode = textNodes[textNodes.length - 1];
            return { node: lastNode, offset: lastNode.textContent.length };
        }
        return null;
    }
    
    // Handle contenteditable input
    function updateLinesFromDOM() {
        const lineDivs = codeArea.querySelectorAll('.line');
        const newLines = [];
        lineDivs.forEach(div => {
            if (div.innerText === '// ... collapsed') return;
            let text = div.innerText;
            newLines.push(text);
        });
        if (newLines.length > 0) {
            lines = newLines;
        } else if (lines.length === 0) {
            lines = [''];
        }
        renderEditor();
        updateLivePreview();
    }
    
    // Keyboard event handler - FIXED Select All and Backspace
    codeArea.addEventListener('keydown', (e) => {
        // Ctrl+A - Select All
        if (e.ctrlKey && e.key === 'a') {
            e.preventDefault();
            const range = document.createRange();
            const codeContent = codeArea.querySelector('.code-content');
            if (codeContent) {
                range.selectNodeContents(codeContent);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
            return;
        }
        
        // Backspace and Delete - handled natively by contenteditable
        // We just need to update our model after the fact
        if (e.key === 'Backspace' || e.key === 'Delete') {
            // Let native handler work, then update
            setTimeout(() => {
                updateLinesFromDOM();
            }, 0);
            return;
        }
        
        // Ctrl+S - Save
        if (e.ctrlKey && e.key === 's') {
            e.preventDefault();
            localStorage.setItem('editorContent', lines.join('\n'));
            alert('Code saved locally!');
        }
        
        // Ctrl+/ - Toggle comment
        if (e.ctrlKey && e.key === '/') {
            e.preventDefault();
            saveCursorPosition();
            if (cursors.length > 0) {
                const lineIdx = cursors[0].line;
                if (lines[lineIdx].trim().startsWith('//')) {
                    lines[lineIdx] = lines[lineIdx].replace(/^\/\/\s?/, '');
                } else {
                    lines[lineIdx] = '// ' + lines[lineIdx];
                }
                renderEditor();
                setTimeout(() => restoreCursorAndSelection(), 10);
            }
        }
        
        // Tab key
        if (e.key === 'Tab') {
            e.preventDefault();
            saveCursorPosition();
            if (cursors.length > 0) {
                const lineIdx = cursors[0].line;
                lines[lineIdx] = '    ' + lines[lineIdx];
                renderEditor();
                setTimeout(() => {
                    cursors[0].ch += 4;
                    restoreCursorAndSelection();
                }, 10);
            }
        }
        
        // Autocomplete trigger
        if (e.key === '.' || (e.ctrlKey && e.key === ' ')) {
            e.preventDefault();
            showAutocomplete();
        }
    });
    
    // Update model on input
    codeArea.addEventListener('input', () => {
        updateLinesFromDOM();
    });
    
    // Track cursor position
    codeArea.addEventListener('click', () => {
        saveCursorPosition();
        renderEditor();
    });
    
    codeArea.addEventListener('keyup', () => {
        saveCursorPosition();
        renderEditor();
    });
    
    // Track active line on mouse move
    codeArea.addEventListener('mousemove', (e) => {
        const target = e.target.closest('.line');
        if (target) {
            activeLine = parseInt(target.dataset.line);
            renderEditor();
        }
    });
    
    // Multi-cursor via Alt+Click
    codeArea.addEventListener('click', (e) => {
        if (e.altKey) {
            e.preventDefault();
            const target = e.target.closest('.line');
            if (target) {
                const lineIdx = parseInt(target.dataset.line);
                cursors.push({ line: lineIdx, ch: 0 });
                renderEditor();
                setTimeout(() => restoreCursorAndSelection(), 10);
            }
        }
    });
    
    // Autocomplete
    const completionWords = ['console', 'log', 'function', 'const', 'let', 'var', 'return', 'if', 'else', 'for', 'while', 'map', 'filter', 'reduce', 'addEventListener', 'document', 'window', 'setTimeout', 'setInterval'];
    
    function showAutocomplete() {
        if (acDropdown) acDropdown.remove();
        acDropdown = document.createElement('div');
        acDropdown.className = 'autocomplete-dropdown';
        const matches = completionWords.slice(0, 8);
        acItems = matches;
        acSelectedIdx = 0;
        
        matches.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'autocomplete-item' + (idx === 0 ? ' selected' : '');
            div.textContent = item;
            div.onclick = () => insertCompletion(item);
            acDropdown.appendChild(div);
        });
        
        acDropdown.style.left = '200px';
        acDropdown.style.top = '100px';
        document.body.appendChild(acDropdown);
        acVisible = true;
        
        const keyHandler = (e) => {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                acSelectedIdx = (acSelectedIdx + 1) % acItems.length;
                updateAcSelection();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                acSelectedIdx = (acSelectedIdx - 1 + acItems.length) % acItems.length;
                updateAcSelection();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                insertCompletion(acItems[acSelectedIdx]);
            } else {
                document.removeEventListener('keydown', keyHandler);
                if (acDropdown) acDropdown.remove();
                acVisible = false;
            }
        };
        document.addEventListener('keydown', keyHandler);
    }
    
    function updateAcSelection() {
        const items = acDropdown.querySelectorAll('.autocomplete-item');
        items.forEach((item, idx) => {
            if (idx === acSelectedIdx) item.classList.add('selected');
            else item.classList.remove('selected');
        });
    }
    
    function insertCompletion(word) {
        if (acDropdown) acDropdown.remove();
        acVisible = false;
        saveCursorPosition();
        if (cursors.length > 0) {
            const lineIdx = cursors[0].line;
            const ch = cursors[0].ch;
            lines[lineIdx] = lines[lineIdx].substring(0, ch) + word + lines[lineIdx].substring(ch);
            renderEditor();
            setTimeout(() => {
                cursors[0].ch = ch + word.length;
                restoreCursorAndSelection();
            }, 10);
        }
    }
    
    // Live Preview
    function updateLivePreview() {
        if (!previewActive || !previewFrame) return;
        const code = lines.join('\n');
        const blob = new Blob([code], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        previewFrame.src = url;
        URL.revokeObjectURL(url);
    }
    
    function togglePreview() {
        if (previewActive) {
            previewPane.remove();
            previewActive = false;
            previewBtn.classList.remove('active');
            editorMain.classList.remove('split');
        } else {
            previewPane = document.createElement('div');
            previewPane.className = 'preview-pane';
            previewPane.innerHTML = `
                <div class="preview-header">
                    <span>🔍 Live Preview (HTML/CSS/JS)</span>
                    <button class="close-preview">✕</button>
                </div>
                <iframe class="preview-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
            `;
            editorMain.appendChild(previewPane);
            previewFrame = previewPane.querySelector('.preview-frame');
            previewPane.querySelector('.close-preview').onclick = () => togglePreview();
            previewActive = true;
            previewBtn.classList.add('active');
            editorMain.classList.add('split');
            updateLivePreview();
        }
    }
    
    previewBtn.onclick = togglePreview;
    
    // Debounced render for scroll
    let renderTimeout;
    function debouncedRender() {
        clearTimeout(renderTimeout);
        renderTimeout = setTimeout(() => renderEditor(), 30);
    }
    
    codeArea.addEventListener('scroll', debouncedRender);
    window.addEventListener('resize', () => renderEditor());
    
    // Initial render
    renderEditor();
    setInterval(() => updateLivePreview(), 1000);
  })();
</script>
</body>
