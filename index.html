<!doctype html>

    <title>VS Code Editor | Working Preview | Fixed All Issues</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #1e1e1e;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        height: 100vh;
      }

      .editor-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #1e1e1e;
        color: #d4d4d4;
      }

      .editor-header {
        background: #252526;
        padding: 8px 16px;
        border-bottom: 1px solid #3c3c3c;
        font-size: 13px;
        display: flex;
        gap: 20px;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .header-right {
        display: flex;
        gap: 12px;
      }

      .preview-btn {
        background: #0e639c;
        border: none;
        color: white;
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
        transition: background 0.2s;
      }

      .preview-btn:hover {
        background: #1177bb;
      }

      .preview-btn.active {
        background: #6c6c6c;
      }

      .refresh-btn {
        background: #2d2d30;
        border: 1px solid #3c3c3c;
        color: white;
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
        transition: background 0.2s;
      }

      .refresh-btn:hover {
        background: #3c3c3c;
      }

      .editor-main {
        display: flex;
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      .editor-main.split {
        flex-direction: row;
      }

      .editor-wrapper {
        display: flex;
        flex: 1;
        overflow: hidden;
        position: relative;
        background: #1e1e1e;
        min-width: 300px;
      }

      .preview-pane {
        width: 50%;
        background: white;
        border-left: 1px solid #3c3c3c;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .preview-header {
        background: #252526;
        padding: 6px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #3c3c3c;
        flex-shrink: 0;
      }

      .preview-header span {
        font-size: 12px;
        color: #cccccc;
      }

      .close-preview {
        background: none;
        border: none;
        color: #cccccc;
        cursor: pointer;
        font-size: 18px;
        padding: 0 8px;
        border-radius: 4px;
      }

      .close-preview:hover {
        background: #3c3c3c;
      }

      .preview-frame {
        flex: 1;
        width: 100%;
        border: none;
        background: white;
      }

      .gutter {
        background: #1e1e1e;
        color: #858585;
        text-align: right;
        padding-right: 12px;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 14px;
        line-height: 21px;
        user-select: none;
        border-right: 1px solid #3c3c3c;
        min-width: 60px;
        overflow-y: auto;
        overflow-x: hidden;
        position: relative;
      }

      .gutter::-webkit-scrollbar {
        display: none;
      }

      .gutter-content {
        position: relative;
      }

      .gutter-line {
        padding: 0 8px 0 12px;
        white-space: nowrap;
        cursor: pointer;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 6px;
        height: 21px;
        line-height: 21px;
      }

      .code-area {
        flex: 1;
        overflow: auto;
        position: relative;
        background: #1e1e1e;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 14px;
        line-height: 21px;
        outline: none;
      }

      .code-content {
        position: relative;
      }

      .line {
        white-space: pre;
        position: relative;
        display: block;
        padding-left: 0;
        cursor: text;
        height: 21px;
        line-height: 21px;
        overflow-x: visible;
      }

      .line.active-line {
        background: #2a2d2e;
      }

      .keyword {
        color: #569cd6;
      }
      .string {
        color: #ce9178;
      }
      .comment {
        color: #6a9955;
      }
      .number {
        color: #b5cea8;
      }
      .bracket {
        color: #ffd700;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #1e1e1e;
      }
      ::-webkit-scrollbar-thumb {
        background: #424242;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4e4e4e;
      }
    </style>
  </head>

        let lines = LOGIN_PAGE.split("\n");

        function syncGutterScroll() {
          if (gutter) gutter.scrollTop = codeArea.scrollTop;
        }

        const KEYWORDS = new Set([
          "function",
          "return",
          "const",
          "let",
          "var",
          "if",
          "else",
          "for",
          "while",
          "DOCTYPE",
          "html",
          "head",
          "body",
          "div",
          "style",
          "script",
        ]);

        function escapeHtml(str) {
          return str.replace(/[&<>]/g, function (m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
          });
        }

        function tokenizeAndHighlight(line) {
          if (!line) return "";
          let result = "";
          let i = 0;
          const len = line.length;

          while (i < len) {
            if (line[i] === '"' || line[i] === "'" || line[i] === "`") {
              const quote = line[i];
              let start = i;
              i++;
              while (i < len && line[i] !== quote) {
                if (line[i] === "\\") i++;
                i++;
              }
              i++;
              result +=
                '<span class="string">' +
                escapeHtml(line.substring(start, i)) +
                "</span>";
              continue;
            }

            if (line[i] === "/" && line[i + 1] === "/") {
              result +=
                '<span class="comment">' +
                escapeHtml(line.substring(i)) +
                "</span>";
              break;
            }

            if (/[0-9]/.test(line[i])) {
              let start = i;
              while (i < len && /[0-9.]/.test(line[i])) i++;
              result +=
                '<span class="number">' +
                escapeHtml(line.substring(start, i)) +
                "</span>";
              continue;
            }

            if (/[a-zA-Z_]/.test(line[i])) {
              let start = i;
              while (i < len && /[a-zA-Z0-9_]/.test(line[i])) i++;
              const word = line.substring(start, i);
              if (KEYWORDS.has(word.toLowerCase())) {
                result +=
                  '<span class="keyword">' + escapeHtml(word) + "</span>";
              } else {
                result += escapeHtml(word);
              }
              continue;
            }

            if ("{}[]()<>".includes(line[i])) {
              result +=
                '<span class="bracket">' + escapeHtml(line[i]) + "</span>";
              i++;
              continue;
            }

            result += escapeHtml(line[i]);
            i++;
          }
          return result;
        }

        function renderEditor() {
          if (isUpdatingFromDOM) return;

          const scrollTop = codeArea.scrollTop;
          const lineHeight = 21;
          const containerHeight = codeArea.clientHeight;
          const totalLines = lines.length;

          const startLine = Math.max(
            0,
            Math.floor(scrollTop / lineHeight) - 10,
          );
          const endLine = Math.min(
            totalLines,
            Math.ceil((scrollTop + containerHeight) / lineHeight) + 10,
          );

          let codeHtml = "";
          let gutterHtml = "";

          for (let i = startLine; i < endLine; i++) {
            const highlighted = tokenizeAndHighlight(lines[i]);
            const activeClass = activeLine === i ? "active-line" : "";
            codeHtml +=
              '<div class="line ' +
              activeClass +
              '" data-line="' +
              i +
              '">' +
              (highlighted || " ") +
              "</div>";
            gutterHtml +=
              '<div class="gutter-line" data-line="' +
              i +
              '"><span>' +
              (i + 1) +
              "</span></div>";
          }

          codeContent.innerHTML = codeHtml;
          gutterContent.innerHTML = gutterHtml;

          const topPadding = startLine * lineHeight;
          const bottomPadding = (totalLines - endLine) * lineHeight;
          codeContent.style.paddingTop = topPadding + "px";
          codeContent.style.paddingBottom = bottomPadding + "px";
          gutterContent.style.paddingTop = topPadding + "px";
          gutterContent.style.paddingBottom = bottomPadding + "px";

          syncGutterScroll();
        }

        function handleScroll() {
          if (scrollTimeout) clearTimeout(scrollTimeout);
          scrollTimeout = setTimeout(function () {
            renderEditor();
            syncGutterScroll();
          }, 16);
        }

        function updateLinesFromDOM() {
          if (isUpdatingFromDOM) return;
          isUpdatingFromDOM = true;

          const lineDivs = codeContent.querySelectorAll(".line");
          const newLines = [];
          for (let i = 0; i < lineDivs.length; i++) {
            newLines.push(lineDivs[i].innerText);
          }

          if (
            newLines.length > 0 &&
            JSON.stringify(newLines) !== JSON.stringify(lines)
          ) {
            lines = newLines;
            renderEditor();
            schedulePreviewUpdate();
          }

          isUpdatingFromDOM = false;
        }

        function saveCursorPosition() {
          const selection = window.getSelection();
          if (!selection.rangeCount) return { line: activeLine, ch: 0 };

          const range = selection.getRangeAt(0);
          let node = range.startContainer;

          while (
            node &&
            node !== codeContent &&
            !node.classList?.contains("line")
          ) {
            node = node.parentElement;
          }

          if (
            node &&
            node.classList &&
            node.classList.contains("line") &&
            node.dataset.line !== undefined
          ) {
            const lineIdx = parseInt(node.dataset.line);
            let charOffset = 0;

            const walker = document.createTreeWalker(
              node,
              NodeFilter.SHOW_TEXT,
            );
            let textNodes = [];
            while (walker.nextNode()) textNodes.push(walker.currentNode);

            for (let i = 0; i < textNodes.length; i++) {
              const textNode = textNodes[i];
              if (textNode === range.startContainer) {
                charOffset += range.startOffset;
                break;
              }
              charOffset += textNode.textContent.length;
            }

            return {
              line: lineIdx,
              ch: Math.min(charOffset, (lines[lineIdx] || "").length),
            };
          }

          return { line: activeLine, ch: 0 };
        }

        function restoreCursorPosition(cursor) {
          if (!cursor) return;

          const lineDiv = document.querySelector(
            '.line[data-line="' + cursor.line + '"]',
          );
          if (!lineDiv) return;

          const textNodes = [];
          const walker = document.createTreeWalker(
            lineDiv,
            NodeFilter.SHOW_TEXT,
          );
          while (walker.nextNode()) textNodes.push(walker.currentNode);

          let currentOffset = 0;
          for (let i = 0; i < textNodes.length; i++) {
            const node = textNodes[i];
            const len = node.textContent.length;
            if (currentOffset + len >= cursor.ch) {
              const range = document.createRange();
              range.setStart(node, Math.min(cursor.ch - currentOffset, len));
              range.collapse(true);
              const sel = window.getSelection();
              sel.removeAllRanges();
              sel.addRange(range);
              return;
            }
            currentOffset += len;
          }
        }

        let currentCursor = { line: 0, ch: 0 };

        function handleInput() {
          const cursor = saveCursorPosition();
          updateLinesFromDOM();
          setTimeout(function () {
            restoreCursorPosition(cursor);
            currentCursor = cursor;
            activeLine = cursor.line;
            renderEditor();
            setTimeout(function () {
              restoreCursorPosition(cursor);
            }, 10);
          }, 0);
        }

        function updateLivePreview() {
          if (!previewActive || !previewFrame) return;
          try {
            const htmlContent = lines.join("\n");
            const blob = new Blob([htmlContent], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            previewFrame.src = url;
            setTimeout(function () {
              URL.revokeObjectURL(url);
            }, 1000);
          } catch (e) {
            console.error("Preview error:", e);
          }
        }

        function schedulePreviewUpdate() {
          if (!previewActive) return;
          if (previewUpdateTimer) clearTimeout(previewUpdateTimer);
          previewUpdateTimer = setTimeout(function () {
            updateLivePreview();
            previewUpdateTimer = null;
          }, 300);
        }

        codeArea.addEventListener("keydown", function (e) {
          if (e.ctrlKey && e.key === "a") {
            e.preventDefault();
            const range = document.createRange();
            range.selectNodeContents(codeContent);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            return;
          }

          currentCursor = saveCursorPosition();

          if (e.key === "Tab") {
            e.preventDefault();
            if (currentCursor.line >= 0 && currentCursor.line < lines.length) {
              lines[currentCursor.line] = "    " + lines[currentCursor.line];
              renderEditor();
              setTimeout(function () {
                currentCursor.ch += 4;
                restoreCursorPosition(currentCursor);
              }, 10);
              schedulePreviewUpdate();
            }
          }

          if (e.ctrlKey && e.key === "s") {
            e.preventDefault();
            localStorage.setItem("savedCode", lines.join("\n"));
            alert("✓ Code saved!");
          }
        });

        codeArea.addEventListener("input", handleInput);

        codeArea.addEventListener("click", function () {
          currentCursor = saveCursorPosition();
          activeLine = currentCursor.line;
          renderEditor();
          setTimeout(function () {
            restoreCursorPosition(currentCursor);
          }, 10);
        });

        codeArea.addEventListener("keyup", function () {
          currentCursor = saveCursorPosition();
          activeLine = currentCursor.line;
          renderEditor();
          setTimeout(function () {
            restoreCursorPosition(currentCursor);
          }, 10);
        });

        codeArea.addEventListener("scroll", handleScroll);

        function togglePreview() {
          if (previewActive) {
            if (previewPane) previewPane.remove();
            previewActive = false;
            previewBtn.classList.remove("active");
            editorMain.classList.remove("split");
          } else {
            previewPane = document.createElement("div");
            previewPane.className = "preview-pane";
            previewPane.innerHTML =
              '<div class="preview-header"><span>🔍 Live Preview - HTML/CSS/JS Runner</span><button class="close-preview">✕</button></div><iframe class="preview-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>';
            editorMain.appendChild(previewPane);
            previewFrame = previewPane.querySelector(".preview-frame");
            previewPane.querySelector(".close-preview").onclick = function () {
              togglePreview();
            };
            previewActive = true;
            previewBtn.classList.add("active");
            editorMain.classList.add("split");
            setTimeout(function () {
              updateLivePreview();
            }, 100);
          }
        }

        previewBtn.onclick = togglePreview;
        refreshPreviewBtn.onclick = function () {
          if (previewActive) updateLivePreview();
        };

        let resizeTimeout;
        window.addEventListener("resize", function () {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(function () {
            renderEditor();
            if (currentCursor) restoreCursorPosition(currentCursor);
          }, 100);
        });

        renderEditor();

        console.log(
          "✅ Editor ready! Click 'Live Preview' to see the login page!",
        );
      })();
    </script>
  </body>
</html>
